name: Windows Server 2025 RDP (Tailscale)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */4 * *' # Bypasses the 5-day idle system

jobs:
  rdp_tailscale:
    runs-on: self-hosted
    steps:
      - name: Configure User Account
        run: |
          $Password = ConvertTo-SecureString "Rishan09032015" -AsPlainText -Force
          # Check if user exists to avoid errors on restart
          if (!(Get-LocalUser -Name "TahseenMahmud" -ErrorAction SilentlyContinue)) {
              New-LocalUser "TahseenMahmud" -Password $Password -FullName "TahseenMahmud"
              Add-LocalGroupMember -Group "Administrators" -Member "TahseenMahmud"
              Add-LocalGroupMember -Group "Remote Desktop Users" -Member "TahseenMahmud"
          } else {
              $User = Get-LocalUser -Name "TahseenMahmud"
              $User | Set-LocalUser -Password $Password
          }

      - name: Connect to Tailscale
        shell: pwsh
        run: |
          # Connects using your Auth Key
          tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --accept-routes --unattended

      - name: Enable Remote Desktop
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          # Disable NLA if you have trouble connecting from certain mobile RDP apps
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0

      - name: Keep Alive & Heartbeat
        run: |
          $Hostname = hostname
          Write-Host "RDP is ready on Tailscale!"
          Write-Host "Connect to: $Hostname"
          Write-Host "User: TahseenMahmud"
          
          while($true) {
            $Time = Get-Date -Format "HH:mm:ss"
            Write-Host "Active - Heartbeat sent at $Time"
            Start-Sleep -Seconds 60
          }
