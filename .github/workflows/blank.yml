name: TahseenHost - High Power Windows RDP

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */4 * *' # Restarts every 4 days

jobs:
  launch-high-spec:
    runs-on: self-hosted
    steps:
      - name: Install Virtualization Tools & Tailscale
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-kvm
          # Official Tailscale install
          curl -fsSL https://tailscale.com/install.sh | sh
          # Start the background service
          sudo systemctl enable --now tailscaled
          sleep 5

      - name: Tailscale Connection
        run: |
          # Added force-reauth to ensure the key is accepted
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=TahseenHost --accept-routes --force-reauth

      - name: Persistent 200GB Disk Management
        run: |
          if [ ! -f ~/windows_data.qcow2 ]; then
            echo "Creating 200GB High-Capacity Disk..."
            qemu-img create -f qcow2 ~/windows_data.qcow2 200G
          else
            echo "Restoring 200GB TahseenHost System..."
          fi

      - name: Boot Windows Server 2025 (Xeon / 16GB)
        run: |
          echo "User: TahseenMahmud | Pass: Rishan09032015"
          sudo qemu-system-x86_64 \
            -m 16G \
            -smp cores=4,threads=2 \
            -cpu host \
            -enable-kvm \
            -drive file=$HOME/windows_data.qcow2,format=qcow2 \
            -net nic -net user,hostfwd=tcp::3389-:3389 \
            -vnc :0 -daemonize

      - name: System Heartbeat
        run: |
          echo "TahseenHost is ONLINE with 16GB RAM."
          while true; do
            echo "Xeon Processor Active - Heartbeat: $(date)"
            sleep 60
          done
